<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopBot+</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #13131a;
    --surface-2: #1e1e2e;
    --border: #2a2a35;
    --purple: #534ab7;
    --purple-light: #7f77dd;
    --purple-pale: #afa9ec;
    --teal: #5dcaa5;
    --text: #e8e6ff;
    --text-muted: #9f9dc0;
    --text-dim: #44444f;
    --radius: 14px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .shell {
    width: 100%;
    max-width: 480px;
    height: min(680px, calc(100vh - 32px));
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .bot-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 0.5px solid var(--purple);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .bot-avatar svg {
    width: 18px;
    height: 18px;
    stroke: var(--purple-light);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .header-info { flex: 1; }

  .header-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-status {
    font-size: 12px;
    color: var(--teal);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 9px;
    max-width: 86%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar svg {
    width: 13px;
    height: 13px;
    stroke: var(--purple-light);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .user .msg-avatar {
    background: #2a1e4a;
    border-color: var(--purple);
  }

  .user .msg-avatar svg { stroke: var(--purple-pale); }

  .bubble-wrap { display: flex; flex-direction: column; gap: 4px; }
  .user .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 10px 13px;
    border-radius: 13px;
    font-size: 13.5px;
    line-height: 1.65;
  }

  .bot .bubble {
    background: var(--surface-2);
    color: #ccc8e8;
    border: 0.5px solid var(--border);
    border-top-left-radius: 4px;
  }

  .user .bubble {
    background: var(--purple);
    color: #eeedfe;
    border-top-right-radius: 4px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-dim);
    padding: 0 3px;
  }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 12px 14px;
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: 13px;
    border-top-left-radius: 4px;
  }

  .typing-bubble span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--purple);
    animation: bounce 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-5px); }
  }

  /* Quick replies */
  .chips {
    padding: 0 14px 10px;
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .chip {
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    font-family: inherit;
  }

  .chip:hover {
    border-color: var(--purple);
    color: var(--purple-pale);
  }

  /* Input area */
  .input-area {
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    padding: 12px 14px;
    display: flex;
    gap: 9px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: 11px;
    padding: 9px 13px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within { border-color: var(--purple); }

  .input-wrap input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-size: 13.5px;
    color: var(--text);
    font-family: inherit;
  }

  .input-wrap input::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--purple);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .send-btn:hover { background: var(--purple-light); }
  .send-btn:active { transform: scale(0.95); }

  .send-btn svg {
    width: 15px;
    height: 15px;
    stroke: #eeedfe;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Error state */
  .error-bubble {
    background: #2a1a1a;
    border-color: #4a2a2a;
    color: #f09595;
  }

  /* Mobile tweaks */
  @media (max-width: 520px) {
    .page { padding: 0; justify-content: flex-end; }
    .shell {
      max-width: 100%;
      height: 100vh;
      border-radius: 0;
      border: none;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .msg { animation: none; }
    .status-dot { animation: none; }
    .typing-bubble span { animation: none; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="shell">

    <div class="header">
      <div class="bot-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="header-info">
        <div class="header-name">ShopBot+</div>
        <div class="header-status"><span class="status-dot"></span>Online</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="chips" id="chips">
      <button class="chip" onclick="useChip('Track my order')">Track my order</button>
      <button class="chip" onclick="useChip('Return policy')">Return policy</button>
      <button class="chip" onclick="useChip('Shipping info')">Shipping info</button>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <input
          type="text"
          id="chat-input"
          placeholder="Ask me anything..."
          autocomplete="off"
          onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }"
        />
      </div>
      <button class="send-btn" onclick="sendMessage()" aria-label="Send message">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('chat-input');
  const chipsEl = document.getElementById('chips');

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, role, isError = false) {
    const isBot = role === 'bot';
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const avatarSvg = isBot
      ? `<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

    wrapper.innerHTML = `
      <div class="msg-avatar">${avatarSvg}</div>
      <div class="bubble-wrap">
        <div class="bubble${isError ? ' error-bubble' : ''}">${text}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;

    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg bot';
    wrapper.id = 'typing-indicator';
    wrapper.innerHTML = `
      <div class="msg-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="typing-bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function setInputDisabled(disabled) {
    inputEl.disabled = disabled;
    document.querySelector('.send-btn').disabled = disabled;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    chipsEl.style.display = 'none';
    addMessage(text, 'user');
    inputEl.value = '';
    setInputDisabled(true);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      hideTyping();

      if (!res.ok) {
        addMessage("Something went wrong. Please try again.", 'bot', true);
      } else {
        const data = await res.json();
        addMessage(data.response, 'bot');
      }
    } catch (err) {
      hideTyping();
      addMessage("Couldn't reach the server. Check your connection and try again.", 'bot', true);
    } finally {
      setInputDisabled(false);
      inputEl.focus();
    }
  }

  function useChip(text) {
    inputEl.value = text;
    sendMessage();
  }

  addMessage("Hi! I'm ShopBot+, your personal shopping assistant. I can help you track orders, answer product questions, or assist with store policies. How can I help you today?", 'bot');
</script>
</body>
</html>
